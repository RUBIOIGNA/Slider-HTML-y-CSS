<head>

    <title>Ejemplo de Slider con HTML y CSS</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>

<body>

    <div id="item-slider">

        <ul class="slider">
            <li id="slide1">

        <ul class="menu">

       <P>Presentación</P>
    </div>
